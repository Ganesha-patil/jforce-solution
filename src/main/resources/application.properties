spring.application.name=demo

spring.mvc.view.prefix=/views/

spring.mvc.view.suffix=.jsp

# batabase url
spring.datasource.url=jdbc:mysql://localhost:3306/boot?serverTimezone=UTC

#username
spring.datasource.username=root

#password

spring.datasource.password=5601

#Explicitly specifies the MySQL JDBC driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#HIBERNATE dialect:
#Tells Hibernate which SQL varient to generate for the specific database (MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
										
#DDL auto setting 
#update : Automatically updates the database schema based on entity changes
#Other options: creates creste-drop ,validate, none
spring.jpa.hibernate.ddl-auto=update

